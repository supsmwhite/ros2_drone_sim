position_controller_node:
  ros__parameters:
    control_frequency: 100.0
    odometry_timeout: 0.2
    supported_goal_frame: map
    setpoint_source: pose_goal
    trajectory_setpoint_timeout: 0.2

    # Altitude control. z and vz inputs are expressed in map/ENU.
    mass: 1.0
    gravity: 9.80665

    # Horizontal position/velocity control in map/ENU. max_tilt_angle is in rad.
    horizontal_position_kp_x: 0.4
    horizontal_position_kp_y: 0.4
    horizontal_velocity_kd_x: 1.2
    horizontal_velocity_kd_y: 1.2
    max_horizontal_acceleration: 0.8
    max_tilt_angle: 0.15

    altitude_kp: 3.0
    vertical_velocity_kd: 3.5
    max_upward_acceleration: 5.0
    max_downward_acceleration: 5.0
    min_collective_thrust: 0.0
    max_collective_thrust: 30.0
    min_tilt_cosine: 0.5

    # Attitude and body-rate control. Output is body roll/pitch/yaw torque.
    attitude_kp_roll: 4.0
    attitude_kp_pitch: 4.0
    attitude_kp_yaw: 1.0
    angular_rate_kd_roll: 0.35
    angular_rate_kd_pitch: 0.35
    angular_rate_kd_yaw: 0.40
    max_torque_roll: 1.0
    max_torque_pitch: 1.0
    max_torque_yaw: 0.20

    # These physical parameters must match dynamics.yaml.
    arm_length: 0.20
    thrust_coefficient: 1.91e-6
    drag_torque_coefficient: 2.60e-7
    min_rpm: 0.0
    max_rpm: 20000.0
