quadrotor_dynamics_node:
  ros__parameters:
    # Rigid-body parameters in SI units.
    mass: 1.0
    inertia_xx: 0.02
    inertia_yy: 0.02
    inertia_zz: 0.04
    arm_length: 0.20

    # F = k_F * omega^2 and Q = k_M * omega^2, with omega in rad/s.
    thrust_coefficient: 1.91e-6
    drag_torque_coefficient: 2.60e-7

    # First-order motor response and command limits.
    motor_time_constant: 0.05
    min_rpm: 0.0
    max_rpm: 20000.0

    # Safety watchdog uses std::chrono::steady_clock, independent of ROS time.
    enable_motor_command_timeout: true
    motor_command_timeout: 0.30

    # Optional map-frame force disturbance. Disabled in every existing workflow.
    # The first version rejects non-zero torque and clears stale force automatically.
    external_wrench_timeout: 0.20
    max_external_force: 2.0
    max_external_torque: 0.0

    gravity: 9.80665

    # Simplified rigid horizontal ground used by the normal Launch workflow.
    enable_ground_contact: true
    ground_z: 0.0

    simulation_frequency: 200.0

    # Odom, IMU, and TF publish every simulation step. Path publishes at 10 Hz.
    # Keep roughly ten minutes of actual flight history at the 200 Hz
    # simulation rate without publishing an unnecessarily dense Path.
    path_publish_divider: 20
    path_max_points: 6000
