multi_goal_static_avoidance_node:
  ros__parameters:
    takeoff_height: 1.5
    minimum_navigation_altitude: 0.50

    goals:
      [
        4.0, 0.0, 1.5, 0.0,
        8.0, 5.0, 1.5, 0.0,
        4.0, 6.5, 3.5, 0.0,
        0.0, 4.0, 1.5, 0.0
      ]

    publish_frequency: 50.0
    odometry_timeout: 0.25

    takeoff_position_tolerance: 0.20
    takeoff_speed_tolerance: 0.15
    takeoff_hold_duration: 1.0

    goal_position_tolerance: 0.20
    goal_speed_tolerance: 0.15
    goal_hold_duration: 1.0

    resolution: 0.25
    max_grid_nodes: 200000

    # Short stop-settle-switch segments need this mission-specific speed to
    # remain below the unchanged 0.35 m/s^2 reference acceleration limit.
    nominal_speed: 0.25
